# Motif Scaffolding configuration
# Path to motif PDB files directory (optional, defaults to internal resources/motif_pdbs)
# motif_pdbs_dir: /path/to/motif_pdbs

# Python executable path for subprocesses (null = use current Python)
python_path: null

# Path to MotifBench test_cases.csv for group mapping in summaries.
# If null, summary generation will not populate benchmark groups.
test_cases_csv: null

# Foldseek configuration (required for diversity and novelty metrics)
# Install foldseek: conda install -c conda-forge -c bioconda foldseek
# Download PDB database: foldseek databases PDB <output_dir>/pdb <output_dir>/tmp
# Set environment variable: export FOLDSEEK_DATABASE=/path/to/pdb_database
foldseek_database: ${oc.env:FOLDSEEK_DATABASE,tools/foldseek/databases/pdb}

# GPU ID for evaluation (optional, use GPU if specified)
gpu_id: null

# List of motifs to evaluate (optional, evaluates all if not specified)
motif_list: null

# Limit samples per motif for quick test (e.g. 5); null = no limit
max_samples_per_motif: null
