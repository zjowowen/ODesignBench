name: designbench
channels:
  - pytorch
  - nvidia
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Core Python & C++ dependencies
  - python=3.10
  - setuptools
  - openmm=8.0
  - pdbfixer

  # Structural biology tools
  - foldseek

  # Core deep learning stack (CUDA 12.1 for Protenix compatibility)
  - pytorch>=2.3.1
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1

  # Structural biology and chemistry foundations
  - rdkit>=2024.03.1
  - openbabel>=3.1.1
  - biopython>=1.83
  - prody

  # Application-level libraries and models
  - pip
  - pip:
      # Core models
      - chai_lab==0.6.1
      - fair-esm==2.0.0

      # Protenix-specific dependencies
      - cuequivariance-torch==0.8.0
      - cuequivariance-ops-torch-cu12==0.8.0
      - deepspeed>=0.17.5
      - triton>=3.3.1
      - optree==0.17.0
      - ml_collections==1.1.0

      # Structural calculation and parsing tools (Chai-1 / CBGBench)
      - tmtools>=0.2.0
      - modelcif>=1.0.0
      - gemmi>=0.6.3
      - biotite==1.2.0
      - pdbeccdutils==1.0.0

      # Data processing and engineering
      - pandas>=2.1.0
      - biopandas>=0.5.1
      - scipy>=1.9.0
      - seaborn>=0.13.0
      - hydra-core>=1.3.2
      - omegaconf>=2.3.0
      - einops>=0.8.0
      - pandera>=0.24.0
      - jaxtyping>=0.2.25
      - beartype>=0.18.0
      - tqdm~=4.66
      - typer~=0.12.0
      # MotifBench analysis extras
      - tabulate
      - MDAnalysis
      - psutil
      - huggingface_hub
      - transformers
      - sentencepiece

      # LigandMPNN specific dependencies
      - filelock
      - fsspec
      - Jinja2
      - MarkupSafe
      - mpmath
      - networkx
      - numpy
      - numba>=0.64.0
      - pyparsing
      - sympy
      - typing_extensions
      - dm-tree
